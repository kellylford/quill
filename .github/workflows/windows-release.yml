name: windows-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: python -m pip install -e .[ui,test]
      - name: Run test suite
        run: pytest
      - name: Verify release corpus
        run: python -m scripts.verify_release_corpus

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build dependencies
        run: python -m pip install -e .[ui]
      - name: Build Windows distribution
        run: python -m scripts.build_windows_distribution --output-dir windows-distribution
      - name: Upload portable bundle
        uses: actions/upload-artifact@v4
        with:
          name: quill-portable
          path: windows-distribution/portable
      - name: Upload installer template
        uses: actions/upload-artifact@v4
        with:
          name: quill-installer-template
          path: windows-distribution/installer/quill.iss
